<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurshan Virk Movies</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#141414;
color:#fff;
}
header{
background:#000;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}
.logo{
font-size:26px;
font-weight:bold;
color:#e50914;
}
.admin{
background:#e50914;
padding:10px 15px;
color:#fff;
text-decoration:none;
border-radius:6px;
}
.hero{
padding:80px 20px;
text-align:center;
background:#222;
}
.hero h1{
font-size:42px;
}
#search{
width:90%;
max-width:500px;
padding:12px;
display:block;
margin:20px auto;
border-radius:8px;
border:none;
}
.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#222;
border-radius:10px;
overflow:hidden;
}
.card img{
width:100%;
height:300px;
object-fit:cover;
}
.card h3{
padding:10px;
}
.card a{
display:block;
background:#e50914;
padding:12px;
text-align:center;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo">🎬 Gurshan Virk Movies</div>
<a class="admin" href="upload.html">Admin</a>
</header>

<div class="hero">
<h1>Unlimited Entertainment</h1>
<p>Your personal movie collection.</p>
</div>

<input id="search" placeholder="Search movies..." onkeyup="searchMovie()">

<div class="movies" id="movies">

<div class="card">
<img src="https://via.placeholder.com/300x450?text=Movie">
<h3>Sample Movie</h3>
<a href="player.html">Watch</a>
</div>

</div>

<script>
function searchMovie(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){
let title=cards[i].innerText.toLowerCase();
cards[i].style.display=title.includes(input)?"block":"none";
}
}
</script>

</body>
</html>
