<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurshan Virk Movies</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
background:#e50914;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
}

.logo{
font-size:28px;
font-weight:bold;
}

.admin{
color:white;
text-decoration:none;
background:black;
padding:10px 18px;
border-radius:6px;
}

.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
}

.hero h1{
font-size:50px;
}

.hero p{
font-size:20px;
margin-top:10px;
}

.search{
text-align:center;
margin:30px;
}

.search input{
width:90%;
max-width:500px;
padding:15px;
border:none;
border-radius:30px;
font-size:18px;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card h3{
padding:10px;
}

button{
width:100%;
padding:12px;
background:#e50914;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

footer{
text-align:center;
padding:20px;
background:#000;
margin-top:30px;
}
</style>

</head>

<body>

<header>

<div class="logo">🎬 Gurshan Virk Movies</div>

<a class="admin" href="upload.html">Admin</a>

</header>

<section class="hero">
<h1>Unlimited Movies</h1>
<p>Watch your own or legally hosted videos.</p>
</section>

<div class="search">
<input type="text" placeholder="Search Movies...">
</div>

<div class="movies">

<div class="card">
<img src="https://via.placeholder.com/300x450?text=Movie+Poster">
<h3>Sample Movie</h3>
<button>▶ Watch</button>
</div>

</div>

<footer>
© 2026 Gurshan Virk Movies
</footer>

</body>
</html>
