<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gurshan Virk Movies</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#141414;
color:#fff;
}
header{
background:#000;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}
.logo{
font-size:26px;
font-weight:bold;
color:#e50914;
}
.admin{
background:#e50914;
padding:10px 15px;
color:#fff;
text-decoration:none;
border-radius:6px;
}
.hero{
padding:80px 20px;
text-align:center;
background:#222;
}
.hero h1{
font-size:42px;
}
.hero p{
font-size:18px;
color:#ccc;
}
#search{
width:90%;
max-width:500px;
padding:12px;
display:block;
margin:20px auto;
border-radius:8px;
border:none;
font-size:16px;
}
.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}
.card{
background:#222;
border-radius:10px;
overflow:hidden;
transition:.3s;
}
.card:hover{
transform:scale(1.05);
}
.card img{
width:100%;
height:300px;
object-fit:cover;
}
.card h3{
padding:10px;
margin:0;
}
.card p{
padding:0 10px;
color:#aaa;
}
.card a{
display:block;
background:#e50914;
padding:12px;
text-align:center;
color:white;
text-decoration:none;
font-weight:bold;
}
.card a:hover{
background:#ff1f1f;
}
</style>

</head>

<body>

<header>
<div class="logo">🎬 Gurshan Virk Movies</div>
<a class="admin" href="upload.html">Admin</a>
</header>

<div class="hero">
<h1>Unlimited Entertainment</h1>
<p>Your personal movie collection.</p>
</div>

<input
id="search"
type="text"
placeholder="Search movies..."
onkeyup="searchMovie()">

<div class="movies" id="movies">
</div>

<script>

let movies = [];

fetch("movies.json")
.then(response => response.json())
.then(data => {
movies = data;
showMovies(movies);
});

function showMovies(list){

let box=document.getElementById("movies");

box.innerHTML="";

list.forEach(movie=>{

box.innerHTML += `
<div class="card">
<img src="${movie.poster}" alt="${movie.title}">
<h3>${movie.title}</h3>
<p>${movie.category}</p>
<a href="${movie.video}" target="_blank">▶ Watch</a>
</div>
`;

});

}

function searchMovie(){

let text=document.getElementById("search").value.toLowerCase();

let result=movies.filter(movie=>

movie.title.toLowerCase().includes(text) ||

movie.category.toLowerCase().includes(text)

);

showMovies(result);

}

</script>

</body>
</html>
